<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Chat Demo</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.3em; }
    #status { font-size: 0.9em; margin: 8px 0; }
    .connected { color: green; }
    .disconnected { color: red; }
    #chat {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 12px;
      margin: 12px 0;
      background: #fafafa;
    }
    .msg { margin: 6px 0; }
    .customer { text-align: right; }
    .customer span {
      background: #333;
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      display: inline-block;
    }
    .agent span {
      background: #e0e0e0;
      padding: 4px 10px;
      border-radius: 12px;
      display: inline-block;
    }
    #input-row { display: flex; gap: 8px; }
    #input-row input { flex: 1; padding: 6px; font-family: monospace; }
    button { padding: 6px 14px; cursor: pointer; font-family: monospace; }
  </style>
</head>
<body>

<h1>WebSocket Chat Demo</h1>
<p>Open DevTools → Network → WS filter. Watch the single persistent connection and all frames flowing through it.</p>

<button id="toggle-btn" onclick="toggleConnection()">Connect</button>
<div id="status" class="disconnected">● disconnected</div>

<div id="chat"></div>

<div id="input-row">
  <input id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" disabled />
  <button onclick="sendMessage()" id="send-btn" disabled>Send</button>
</div>

<script>
  let ws = null;

  function toggleConnection() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
    } else {
      connect();
    }
  }

  function connect() {
    ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      ws.send(JSON.stringify({ msgType: "identity", role: "customer", from: "", text: "" }));
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      appendMessage(msg.role, msg.text);
    };

    ws.onclose = () => {
      setDisconnected();
    };

    ws.onerror = () => {
      setDisconnected();
    };
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMessage('customer', text);
    ws.send(JSON.stringify({ msgType: "chat", role: "customer", from: "", text }));
    input.value = '';
  }

  function appendMessage(role, text) {
    if (role === 'agent' && text === 'How can I help you today?') {
      setConnected();
    }
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<span>${role === 'customer' ? 'You' : 'Agent'}: ${text}</span>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function setConnected() {
    document.getElementById('status').textContent = '● connected';
    document.getElementById('status').className = 'connected';
    document.getElementById('toggle-btn').textContent = 'Disconnect';
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
  }

  function setDisconnected() {
    document.getElementById('status').textContent = '● disconnected';
    document.getElementById('status').className = 'disconnected';
    document.getElementById('toggle-btn').textContent = 'Connect';
    document.getElementById('msg-input').disabled = true;
    document.getElementById('send-btn').disabled = true;
    ws = null;
  }
</script>
</body>
</html>
